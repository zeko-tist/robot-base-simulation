# config/ros2_control.yaml
#
# controller_manager configuration for ZEKO.
#
# Loads:
#   - joint_state_broadcaster  : publishes /joint_states for
#                                 robot_state_publisher / Nav2 / RViz
#   - diff_drive_controller    : subscribes to /cmd_vel (geometry_msgs/Twist,
#                                 linear.x + angular.z) and drives
#                                 left_wheel_joint / right_wheel_joint
#
# wheel_separation / wheel_radius below MUST match the corresponding
# <xacro:property> values in urdf/base.xacro
# (wheel_separation = 0.60 m, wheel_radius = 0.1524 m).

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController


joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint


diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    # Geometry -- must match urdf/base.xacro
    wheel_separation: 0.60
    wheel_radius: 0.1524

    # Multipliers left at 1.0; tune only if real-world tracking drifts
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Odometry
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0, 0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: true

    # Command / interface types
    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
    use_stamped_vel: false

    # Velocity and acceleration limits for linear.x
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 1.0      # m/s
        min_velocity: -1.0     # m/s
        max_acceleration: 1.0  # m/s^2
        min_acceleration: -1.0 # m/s^2

    # Velocity and acceleration limits for angular.z
    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 2.0      # rad/s
        min_velocity: -2.0     # rad/s
        max_acceleration: 2.0  # rad/s^2
        min_acceleration: -2.0 # rad/s^2
